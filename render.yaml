services:
  - type: web
    name: mtn-groupshare
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MTN_PHONE
        sync: false
      - key: MTN_PIN
        sync: false
      - key: OTP_PORT
        value: "6060"
      - key: NGROK_AUTHTOKEN
        sync: false
      - key: NGROK_DOMAIN
        sync: false
      - key: EXCEL_FOLDER_PATH
        value: /data/upload_files
      - key: FILE_RETENTION_HOURS
        value: "24"
      - key: DISK_LIMIT_MB
        value: "900"
      - key: ORDERSYSTEM_URL
        sync: false
      - key: GROUPSHARE_CALLBACK_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN_2
        sync: false
      - key: TELEGRAM_CHAT_ID_2
        sync: false
      - key: NTFY_URL
        sync: false
      - key: MAX_FILE_RETRIES
        value: "5"
      - key: ALERT_COOLDOWN_MINS
        value: "5"
      - key: EVD_ACCOUNT_1_KEY
        sync: false
      - key: EVD_ACCOUNT_1_PHONE
        sync: false
      - key: EVD_ACCOUNT_1_AMOUNT
        value: "1"
      - key: EVD_ACCOUNT_1_NETWORK
        value: "MTN"
      - key: EVD_AUTO_ENABLED
        value: "true"
      - key: EVD_AUTO_MIN_BALANCE_GHC
        value: "4000"
      - key: EVD_PURCHASE_TARGET_GHC
        value: "4813"
      - key: EVD_AUTO_POLL_MINS
        value: "3"
    healthCheckPath: /health
    disk:
      name: groupshare-data
      mountPath: /data/upload_files
      sizeGB: 1